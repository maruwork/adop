repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.3
    hooks:
      - id: check-github-workflows

  - repo: local
    hooks:
      - id: forbid-secret-files
        name: block committing secret / env / key files
        entry: "secret, .env, or key file must never be committed"
        language: fail
        files: '(^|/)\.env($|\.)|\.(pem|key|p12|pfx)$|(^|/)(secrets|keys)/|(^|/)id_(rsa|ed25519)$|credentials.*\.json$'
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format --check
        entry: python -m ruff format --check
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: python -m mypy shared/python tests
        language: system
        pass_filenames: false
