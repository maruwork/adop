name: Tool Surface Examples

on:
  workflow_dispatch:

jobs:
  mixed-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS tooling
        run: npm install

      - name: Run ESLint
        run: npm run lint:js

      - name: Run markdownlint-cli2
        run: npm run lint:md

      - name: Run Prettier
        run: npm run format:check

      - name: Run actionlint
        uses: rhysd/actionlint@v1

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.tooling-example

      - name: Run ShellCheck
        uses: reviewdog/action-shellcheck@v1
        with:
          path: scripts/repo-smoke.sh

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: .
