name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pip-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install .
      - name: Verify installed commands
        run: |
          adop --version
          adop-sync --help
      - name: Black-box consumer project smoke
        shell: bash
        run: |
          PROJECT=$(mktemp -d)
          cd "$PROJECT"
          adop init
          test -d .adop
          test -f adop-overlay.md
          adop quick-intake --candidate ruff --source doc --use-case lint-ci --why-now "smoke" --platform any --license MIT --cost free --version 0.5.0 --category cli --ai-compatibility any --data-flow-json '{"destination":"local","data_types":["code"],"opt_in":true}'
          adop quick-compare --use-case lint-ci --candidate ruff --candidate pylint --selected ruff
          adop quick-trial --use-case lint-ci --mode read-only-comparison --executor ci --decision-owner lead --landing-target ci/lint
          adop quick-close-trial --trial-id tr-001 --verdict promote --observed-effect "works" --judgment-reason "trial produced reusable value" --next-action "promote into the lint workflow" --recurring-control-decision yes --root-cause-hypothesis "lint evaluation needed a stable reusable helper" --preventive-action "document the approved lint usage scene" --why-this-problem-recurred "the team had no explicit adoption record before the trial"
          adop lint

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Syntax check (py_compile)
        run: python -m py_compile shared/python/adop_cli.py shared/python/adop_artifacts.py shared/python/adop_validation.py shared/python/adop_types.py shared/python/adop_summary.py shared/python/adop_sync.py shared/python/adop_ids.py shared/python/adop_state_machine.py shared/python/common.py
      - name: Version check
        run: python shared/python/adop_cli.py --version
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Smoke test (quick-intake → compare → trial → close → lint)
        shell: bash
        run: |
          ADOP="python shared/python/adop_cli.py"
          ROOT=$(mktemp -d)
          $ADOP quick-intake --artifact-root "$ROOT" --candidate ruff --source doc --use-case lint-ci --why-now "smoke"
          $ADOP quick-compare --artifact-root "$ROOT" --use-case lint-ci --candidate ruff --candidate pylint --selected ruff
          $ADOP quick-trial   --artifact-root "$ROOT" --use-case lint-ci --mode read-only-comparison --executor ci --decision-owner lead --landing-target ci/lint
          $ADOP quick-close-trial --artifact-root "$ROOT" --trial-id tr-001 --verdict hold --observed-effect "needs more data"
          $ADOP lint --artifact-root "$ROOT"
