name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Syntax check (py_compile)
        run: python -m py_compile shared/python/adop_cli.py shared/python/adop_artifacts.py shared/python/adop_validation.py shared/python/adop_types.py shared/python/adop_summary.py shared/python/adop_sync.py shared/python/adop_ids.py shared/python/adop_state_machine.py shared/python/common.py
      - name: Version check
        run: python shared/python/adop_cli.py --version
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Smoke test (quick-intake → compare → trial → close → lint)
        shell: bash
        run: |
          ADOP="python shared/python/adop_cli.py"
          ROOT=$(mktemp -d)
          $ADOP quick-intake --artifact-root "$ROOT" --candidate ruff --source doc --use-case lint-ci --why-now "smoke"
          $ADOP quick-compare --artifact-root "$ROOT" --use-case lint-ci --candidate ruff --candidate pylint --selected ruff
          $ADOP quick-trial   --artifact-root "$ROOT" --use-case lint-ci --mode read-only-comparison --executor ci
          $ADOP quick-close-trial --artifact-root "$ROOT" --trial-id tr-001 --verdict hold --observed-effect "needs more data"
          $ADOP lint --artifact-root "$ROOT"
